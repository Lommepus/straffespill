<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Pac-Man Japanske Dyr</title>
<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
  }
  canvas {
    display: block;
    margin: auto;
    background: #111;
  }
  #ui {
    padding: 10px;
  }
</style>
</head>
<body>

<div id="ui">
  <h2 id="instruction"></h2>
  <p>Poeng: <span id="score">0</span> | Streak: <span id="streak">0</span></p>
</div>

<canvas id="game" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const animals = [
  {jp: "ねこ", no: "katt", emoji: "🐱"},
  {jp: "いぬ", no: "hund", emoji: "🐶"},
  {jp: "とり", no: "fugl", emoji: "🐦"},
  {jp: "さかな", no: "fisk", emoji: "🐟"},
  {jp: "うま", no: "hest", emoji: "🐴"},
  {jp: "ぞう", no: "elefant", emoji: "🐘"}
];

let pacman = {x: 250, y: 250, size: 20, dx: 0, dy: 0};
let ghosts = [];
let score = 0;
let streak = 0;
let sequence = [];
let currentIndex = 0;
let timeLimit = 5000;
let roundStart = Date.now();

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function newRound() {
  ghosts = [];
  sequence = shuffle([...animals]).slice(0, 3 + Math.min(3, Math.floor(score / 5)));
  currentIndex = 0;
  roundStart = Date.now();

  document.getElementById("instruction").innerText =
    "Ta: " + sequence[currentIndex].jp + " (" + sequence[currentIndex].no + ")";

  sequence.forEach(a => {
    ghosts.push({
      ...a,
      x: Math.random() * 450,
      y: Math.random() * 450
    });
  });
}

function drawPacman() {
  ctx.beginPath();
  ctx.arc(pacman.x, pacman.y, pacman.size, 0.2 * Math.PI, 1.8 * Math.PI);
  ctx.lineTo(pacman.x, pacman.y);
  ctx.fillStyle = "yellow";
  ctx.fill();
}

function drawGhosts() {
  ctx.font = "20px Arial";
  ghosts.forEach(g => {
    ctx.fillText(g.emoji, g.x, g.y);
    ctx.fillText(g.jp, g.x - 10, g.y + 20);
  });
}

function movePacman() {
  pacman.x += pacman.dx;
  pacman.y += pacman.dy;

  pacman.x = Math.max(0, Math.min(canvas.width, pacman.x));
  pacman.y = Math.max(0, Math.min(canvas.height, pacman.y));
}

function checkCollision() {
  ghosts.forEach((g, i) => {
    let dist = Math.hypot(pacman.x - g.x, pacman.y - g.y);
    if (dist < 20) {
      if (g.jp === sequence[currentIndex].jp) {
        score++;
        streak++;
        currentIndex++;

        ghosts.splice(i, 1);

        if (currentIndex >= sequence.length) {
          newRound();
        } else {
          document.getElementById("instruction").innerText =
            "Ta: " + sequence[currentIndex].jp + " (" + sequence[currentIndex].no + ")";
        }
      } else {
        streak = 0;
        currentIndex = 0;
        document.getElementById("instruction").innerText =
          "Feil! Start sekvens på nytt: " + sequence[currentIndex].jp;
      }
    }
  });
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  movePacman();
  checkCollision();

  drawPacman();
  drawGhosts();

  document.getElementById("score").innerText = score;
  document.getElementById("streak").innerText = streak;

  // Fluency: tidskrav
  if (Date.now() - roundStart > timeLimit) {
    streak = 0;
    newRound();
  }

  requestAnimationFrame(update);
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") pacman.dy = -2;
  if (e.key === "ArrowDown") pacman.dy = 2;
  if (e.key === "ArrowLeft") pacman.dx = -2;
  if (e.key === "ArrowRight") pacman.dx = 2;
});

newRound();
update();
</script>

</body>
</html>
